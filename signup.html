<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Gateway</title>
    <style>
        :root {
            --primary-neon: #03f979;
            --secondary-neon: #08f6a2;
            --bg-dark: #0a0f12;
            --card-glass: rgba(15, 23, 30, 0.75);
            --text-main: #ffffff;
            --text-muted: #8fa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 10% 20%, rgba(3, 249, 121, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(8, 246, 162, 0.08) 0%, transparent 40%),
                        var(--bg-dark);
            overflow-x: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(3, 249, 121, 0.15);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: none;
            transition: all 0.3s ease;
        }

        .auth-card.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.25s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-neon);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 10px rgba(3, 249, 121, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            border: none;
            outline: none;
            padding: 14px;
            color: #050505;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.95;
            box-shadow: 0 0 15px rgba(8, 246, 162, 0.4);
            transform: translateY(-1px);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-switch a {
            color: var(--secondary-neon);
            text-decoration: none;
            font-weight: 500;
            margin-left: 4px;
            cursor: pointer;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .status-msg {
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }

        .status-msg.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .status-msg.success {
            display: block;
            background: rgba(3, 249, 121, 0.1);
            border: 1px solid rgba(3, 249, 121, 0.3);
            color: var(--primary-neon);
        }
        
        .reset-option {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 18px;
        }
        .reset-option a {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
        }
        .reset-option a:hover {
            color: var(--primary-neon);
        }
.back-home {
    width: 100%;
    text-align: left;
    margin-bottom: 25px;
}


.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;

    padding: 7px 14px;

    border-radius: 999px;

    background: #03f979;
    color: #000;

    text-decoration: none;

    font-size: 13px;
    font-weight: 600;

    transition: 0.3s;
}


.back-btn:hover {
    opacity: 0.85;
}


/* Mobile */
@media(max-width:480px){

    .back-home{
        text-align:center;
        margin-bottom:20px;
    }


    .back-btn{

        width:auto;
        padding:8px 15px;
        font-size:12px;

    }

}

    </style>
</head>
<body>

    
   <div class="auth-container">


    <div class="auth-card active" id="signin-card">

        <!-- Back Home Button -->
        <div class="back-home">
            <a href="index.html" class="back-btn">
                ← Back to Home
            </a>
        </div>


        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to access your account</p>

        <div class="status-msg" id="signin-msg"></div>

        <form id="signin-form" onsubmit="handleSignIn(event)">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signin-email" required placeholder="name@domain.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signin-password" required placeholder="••••••••">
            </div>

            <div class="reset-option">
                <a onclick="switchCard('reset-card')">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="btn-submit">
                Sign In
            </button>

        </form>


        <div class="auth-switch">
            Don't have an account?
            <a onclick="switchCard('signup-card')">
                Sign Up
            </a>
        </div>

    </div>

  <script type="module" src="js/signup.js"></script>
   
</body>
</html>
