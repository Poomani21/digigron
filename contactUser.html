<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries & Contact Requests</title>
    <style>
      :root {
        /* Color Palette */
        --bg-main: #0a0c10;
        --bg-card: #12161f;
        --bg-hover: #1a202c;
        --border-color: #242f41;
        
        --brand-primary: #03f979;
        --brand-secondary: #08f6a2;
        
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --text-dark: #000000;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        padding: 16px 12px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
    }

    .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Executive Header Actions Layout */
    .header-actions {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
    }

    .header-title-group {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
    }

    h2 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .actions-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
    }

    .search-input {
        background-color: var(--bg-card);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 10px 14px;
        font-size: 0.875rem;
        border-radius: 6px;
        outline: none;
        width: 100%;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
        border-color: var(--brand-primary);
        box-shadow: 0 0 8px rgba(3, 249, 121, 0.2);
    }

    .search-input::placeholder {
        color: var(--text-muted);
    }

    /* Primary Solid Button: Back to Home */
    .btn-home {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
        color: var(--text-dark);
        border: none;
        padding: 10px 18px;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease-in-out;
        width: 100%; /* Default mobile view */
    }

    .btn-home:hover {
        box-shadow: 0 0 16px rgba(3, 249, 121, 0.4);
        transform: translateY(-1px);
    }

    .btn-home span {
        font-size: 1.1rem;
        line-height: 1;
        transition: transform 0.2s ease;
    }

    .btn-home:hover span {
        transform: translateX(-3px);
    }

    /* Secondary Outlined Button: Export to CSV */
    .btn-export {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: transparent;
        color: var(--brand-primary);
        border: 1px solid var(--brand-primary);
        padding: 10px 18px;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        width: 100%; /* Default mobile view */
    }

    .btn-export:hover {
        background-color: var(--brand-primary);
        color: var(--text-dark);
        box-shadow: 0 0 16px rgba(3, 249, 121, 0.25);
    }

    /* Table Container Styling */
    .table-container {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.875rem;
        min-width: 900px;
    }

    th {
        background-color: rgba(36, 47, 65, 0.4);
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
    }

    td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
        white-space: nowrap;
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:hover td {
        background-color: var(--bg-hover);
    }

    td.font-mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: var(--text-muted);
        font-size: 0.825rem;
    }

    /* Responsive Desktop Layout */
    @media (min-width: 640px) {
        body {
            padding: 32px 20px;
        }
        
        .header-actions {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .actions-group {
            flex-direction: row;
            align-items: center;
            width: auto;
        }

        .search-input {
            width: 240px;
        }
        
        .btn-home, .btn-export {
            width: auto;
        }
        
        h2 {
            font-size: 1.5rem;
        }
    }

    @media (min-width: 1024px) {
        body {
            padding: 40px 24px;
        }
        
        th, td {
            padding: 16px 20px;
        }
    }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-actions">
            <div class="header-title-group">
                <a href="index.html" class="btn-home">
                    <span>←</span>Home
                </a>
            </div>

            <h2>Contact Inquiries</h2>

            <div class="actions-group">
                <input type="text" id="searchInput" placeholder="Search inquiries..." class="search-input" />
                <button id="exportBtn" class="btn-export">Export to CSV</button>
            </div>
        </div>

        <div class="table-container">
            <table id="contactsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Company</th>
                        <th>Budget</th>
                        <th>Phone</th>
                        <th>Services</th>
                        <th>Submitted At</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic Rows Insertion -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="js/userContact.js"></script>
</body>
</html>
